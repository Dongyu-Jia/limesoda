name: Limesoda CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install Python Linting Tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black
          
      - name: Lint with flake8
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        
      - name: Check formatting with black
        run: black --check .

  test-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn pytest prisma
          
      - name: Generate Prisma Client
        run: prisma generate --schema=schema/prisma/schema.prisma
        
      - name: Run Backend Tests
        run: pytest

  test-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./UX_prototype
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Install dependencies
        run: npm install
        
      - name: Run Frontend Tests
        run: npm test -- --run # assuming vitest or similar

  report-failure:
    runs-on: ubuntu-latest
    if: failure()
    needs: [lint, test-api, test-web]
    steps:
      - uses: actions/checkout@v4
      
      - name: Check for existing issue
        id: check-issue
        run: |
          count=$(gh issue list --search "🔴 Fix workflow runs in:title is:open" --json number --jq 'length')
          echo "count=$count" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Create Issue on Failure
        if: steps.check-issue.outputs.count == '0'
        run: |
          gh issue create \
            --title "🔴 Fix workflow runs" \
            --body "The CI pipeline failed. Please check the logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --label "bug" \
            --label "core"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
