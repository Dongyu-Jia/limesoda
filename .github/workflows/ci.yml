name: Limesoda CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install Python Linting Tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black
          
      - name: Lint with flake8
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        
      - name: Check formatting with black
        run: black --check .

  test-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn pytest prisma
          
      - name: Generate Prisma Client
        run: prisma generate --schema=schema/prisma/schema.prisma
        
      - name: Run Backend Tests
        run: pytest

  test-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./UX_prototype
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Install dependencies
        run: npm install
        
      - name: Run Frontend Tests
        run: npm test -- --run # assuming vitest or similar
